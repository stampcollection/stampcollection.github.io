---
layout: default
---

<h1>{{ page.country_name }}</h1>

<div class="stamp-grid">
  {% assign country_stamps = site.stamps | where: "country", page.country_name | sort: "year" %}
  {% for stamp in country_stamps %}
    <a class="stamp-card" href="{{ stamp.url }}">
      {% if stamp.image %}
        <img src="{{ stamp.image }}" alt="{{ stamp.title }}">
      {% endif %}
      <div class="stamp-info">
        <h3>{{ stamp.title }}</h3>
        <p>{{ stamp.year }}</p>
      </div>
    </a>
  {% endfor %}
</div>

<style>
.stamp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}
.stamp-card {
  display: block;
  border: 1px solid #ccc;
  border-radius: 8px;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s, box-shadow 0.2s;
}
.stamp-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
.stamp-card img {
  width: 100%;
  height: auto;
  display: block;
}
.stamp-info {
  padding: 10px;
}
.stamp-info h3 {
  margin: 0 0 5px;
  font-size: 1.1em;
}
.stamp-info p {
  margin: 0;
  font-size: 0.9em;
  color: #555;
}
</style>

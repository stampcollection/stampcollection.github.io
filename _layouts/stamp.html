---
layout: default
---

<div class="stamp-row">

  <div class="stamp-image">
    <img src="{{ page.image }}" alt="{{ page.title }}">
  </div>

  <div class="stamp-info">
    <h2>{{ page.title }}</h2>
    <p><strong>Country:</strong> {{ page.country }}</p>
    <p><strong>Year:</strong> {{ page.year }}</p>
    <p>{{ content }}</p>
  </div>

</div>
